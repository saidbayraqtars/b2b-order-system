services:
  db:
    image: postgres:16-alpine
    container_name: b2b-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: b2b
    ports:
      # Host 5433 (5432 is used by another local project's postgres) → container 5432
      - "5433:5432"
    volumes:
      - b2b_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d b2b"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  b2b_pgdata:
